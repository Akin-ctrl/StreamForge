name: deploy

x-dev-images:
  postgres: &postgres_image postgres:16-alpine
  timescaledb: &timescaledb_image timescale/timescaledb@sha256:0af03ecf697825f6ddae76fd275d16bf46007bed6d00eb3d754779cb7db96fa6
  redpanda: &redpanda_image redpandadata/redpanda:v26.1.9
  dev_bootstrap: &dev_bootstrap_image python:3.12-slim
  modbus_simulator: &modbus_simulator_image oitc/modbus-server@sha256:58a9e9b97b994a2bbfb79bbe43e25387a2e6c458220b44cd058007af3881c243
  prometheus: &prometheus_image prom/prometheus:v3.2.1
  kafdrop: &kafdrop_image obsidiandynamics/kafdrop:3.30.0
  kafka_ui: &kafka_ui_image provectuslabs/kafka-ui@sha256:8f2ff02d64b0a7a2b71b6b3b3148b85f66d00ec20ad40c30bdcd415d46d31818

services:
  postgres:
    image: *postgres_image
    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d streamforge"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  timescaledb:
    image: *timescaledb_image
    environment:
      POSTGRES_DB: streamforge
      POSTGRES_USER: streamforge
      POSTGRES_PASSWORD: streamforge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d streamforge"]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "5434:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

  control_plane:
    image: streamforge/control-plane:dev
    build:
      context: ../../control-plane
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SF_DATABASE_URL: postgresql+psycopg://streamforge:streamforge@postgres:5432/streamforge
      SF_JWT_SECRET: Q7m4J9p2L6x8V3c1N5b7H0r4T2y8K6d1S9w3F5g7P1z4
      SF_CONFIG_SECRET_KEY: VaLKC29arWaHqoljiNX-eVQ-dMkpeDbugFT7G_0G2is=
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).getcode()==200 else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    ports:
      - "8001:8000"

  kafka:
    image: *redpanda_image
    hostname: kafka
    command:
      - redpanda
      - start
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://kafka:9092,external://localhost:9092
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - kafka:33145
      - --advertise-rpc-addr
      - kafka:33145
      - --mode
      - dev-container
      - --smp
      - "1"
      - --default-log-level=info
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info --brokers localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      start_period: 20s
      retries: 12
    ports:
      - "9092:19092"
      - "8082:18081"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks:
      default:
        aliases:
          - schema_registry

  dev_bootstrap:
    profiles: ["seed"]
    image: *dev_bootstrap_image
    depends_on:
      control_plane:
        condition: service_healthy
    volumes:
      - .:/app/deploy-dev:ro
    environment:
      CONTROL_PLANE_URL: http://control_plane:8000
      CONTROL_PLANE_GATEWAY_ID: gateway-demo-01
      DEV_ADMIN_USERNAME: streamforge_admin
      DEV_ADMIN_PASSWORD: LocalAdminBootstrap42
      DEV_GATEWAY_CONFIG_PATH: /app/deploy-dev/gateway_config.sample.json
    command: ["python", "/app/deploy-dev/dev_bootstrap.py"]

  modbus-simulator:
    image: *modbus_simulator_image
    ports:
      - "5020:5020"

  gateway_runtime:
    image: streamforge/gateway_runtime:dev
    build:
      context: ../..
      dockerfile: gateway_runtime/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      modbus-simulator:
        condition: service_started
      control_plane:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./gateway_config.sample.json:/config/gateway_config.json:ro
      - redpanda-data:/var/lib/redpanda/data:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - gateway-data:/data
    environment:
      # Static config (uncomment to use instead of control-plane polling)
      # GATEWAY_CONFIG: /config/gateway_config.json

      # Control-plane polling configuration (used for dynamic config)
      CONTROL_PLANE_URL: http://control_plane:8000
      CONTROL_PLANE_GATEWAY_ID: ${CONTROL_PLANE_GATEWAY_ID:-gateway-demo-01}
      CONTROL_PLANE_GATEWAY_HOSTNAME: ${CONTROL_PLANE_GATEWAY_HOSTNAME:-gateway-demo-01.local}
      CONTROL_PLANE_ENROLLMENT_TOKEN: ${CONTROL_PLANE_ENROLLMENT_TOKEN:-}
      CONTROL_PLANE_GATEWAY_HARDWARE_INFO: ${CONTROL_PLANE_GATEWAY_HARDWARE_INFO:-}
      OVERFLOW_MONITOR_PATH: /var/lib/redpanda/data
      OVERFLOW_CHECK_INTERVAL: ${OVERFLOW_CHECK_INTERVAL:-60}
      OVERFLOW_COMPRESS_THRESHOLD_PERCENT: ${OVERFLOW_COMPRESS_THRESHOLD_PERCENT:-70}
      OVERFLOW_DOWNSAMPLE_THRESHOLD_PERCENT: ${OVERFLOW_DOWNSAMPLE_THRESHOLD_PERCENT:-80}
      OVERFLOW_EVICT_THRESHOLD_PERCENT: ${OVERFLOW_EVICT_THRESHOLD_PERCENT:-90}
      OVERFLOW_BLOCK_THRESHOLD_PERCENT: ${OVERFLOW_BLOCK_THRESHOLD_PERCENT:-95}
      # Optional: preset gateway JWT token. If unset, gateway_runtime will request one automatically.
      # CONTROL_PLANE_TOKEN: <gateway-jwt-token>
      # GATEWAY_CONFIG_CACHE: Local cache path for control-plane config used for offline restarts
      GATEWAY_CONFIG_CACHE: /data/config/gateway.json
      SCHEMA_CACHE_PATH: /data/schemas.cache.json
      # CONTROL_PLANE_CIRCUIT_BREAKER_FAILURE_THRESHOLD: Failures before control-plane requests pause (default: 5)
      # CONTROL_PLANE_CIRCUIT_BREAKER_OPEN_SECONDS: Cooldown before half-open retry (default: 30)

      # Polling behavior tuning
      # GATEWAY_POLL_INTERVAL: Poll control-plane every N seconds (default: 30). Cached startups refresh immediately once.
      GATEWAY_POLL_INTERVAL: "30"
      # GATEWAY_POLL_BACKOFF_MULTIPLIER: Exponential backoff multiplier on errors (default: 2.0)
      GATEWAY_POLL_BACKOFF_MULTIPLIER: "2.0"
      # GATEWAY_POLL_MAX_BACKOFF: Maximum backoff time in seconds (default: 300)
      GATEWAY_POLL_MAX_BACKOFF: "300"
      # SINK_CIRCUIT_BREAKER_FAILURE_THRESHOLD: Failures before sink downstream writes pause (default: 5)
      # SINK_CIRCUIT_BREAKER_OPEN_SECONDS: Cooldown before sink retries resume (default: 30)

      # Kafka-compatible broker and runtime configuration. The local broker image is Redpanda.
      KAFKA_BROKER_FLAVOR: redpanda
      KAFKA_BOOTSTRAP: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema_registry:8081
      ADAPTER_MODBUS_TCP_IMAGE: streamforge/gateway_runtime:dev
      # When the local broker is not already reachable, gateway_runtime can provision and supervise
      # its own single-node Redpanda container through the Docker socket.
      KAFKA_AUTO_MANAGE: "true"
      REDPANDA_IMAGE: *redpanda_image
      HEALTH_HOST: 0.0.0.0
      HEALTH_PORT: "8088"
      DOCKER_NETWORK: deploy_default
      SINK_TIMESCALEDB_IMAGE: streamforge/gateway_runtime:dev
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8088/health/ready', timeout=5).getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    ports:
      - "8088:8088"

  prometheus:
    image: *prometheus_image
    depends_on:
      gateway_runtime:
        condition: service_started
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  kafdrop:
    image: *kafdrop_image
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    ports:
      - "9000:9000"

  kafka_ui:
    image: *kafka_ui_image
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: "http://schema_registry:8081"

  ui:
    build:
      context: ../../ui
      dockerfile: Dockerfile
    depends_on:
      control_plane:
        condition: service_healthy
    ports:
      - "5000:80"

volumes:
  gateway-data:
  postgres-data:
  redpanda-data:
  timescaledb-data:
